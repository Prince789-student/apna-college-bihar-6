   <script>
      // Hard-Reload if stale 'Portal' title detected
      if (document.title.includes('Portal')) { window.location.reload(true); }
      if ('serviceWorker' in navigator) {
         navigator.serviceWorker.getRegistrations().then(regs => {
            for (let reg of regs) { if (reg.active) reg.unregister(); }
         });
      }
   </script>

   <script>
      if ('serviceWorker' in navigator) {
         window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(err => console.error("SW error:", err));
         });
      }
      window.addEventListener('beforeinstallprompt', (e) => {
         e.preventDefault();
         window.deferredPrompt = e;
         window.dispatchEvent(new Event('pwa-ready'));
      });
   </script>

<body class="dark">
   <div id="root"></div>
   <script>
      // Global Fail-Safe Error Handler
      window.addEventListener('error', (e) => {
         if (e.target && e.target.tagName === 'SCRIPT') {
            console.warn("Script loading failure - Deep Reloading...");
            window.location.reload(true);
         }
      }, true);
   </script>
   <script type="module" src="/src/main.jsx"></script>
